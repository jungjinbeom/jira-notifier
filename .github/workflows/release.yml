name: release

# v로 시작하는 태그를 push하면 Windows/macOS/Linux 설치 파일을 자동 빌드하여
# GitHub Release(초안)로 첨부한다. 수동 실행(workflow_dispatch)도 가능하다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write # Release 생성/자산 업로드 권한
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel (x86_64)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 버전은 tauri.conf.json 값(__VERSION__)에서 자동으로 채워진다.
          tagName: v__VERSION__
          releaseName: "Jira Notifier v__VERSION__"
          releaseBody: "아래 Assets에서 사용하는 OS에 맞는 설치 파일을 내려받아 설치하세요."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
